<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bubu Dudu Sorry 💖</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <img src="bubu.webp" class="gif" alt="bubu-dudu">

    <h2>I'm Really Sorry 🥺</h2>

    <p>You mean everything to me 💕</p>
    <p>Please don't stay mad at me 😢</p>
    <p><b>Will you forgive me?</b></p>

    <div class="btns">
        <button class="yes" onclick="forgive()">Forgive Me 💖</button>
        <button class="no" onmouseover="moveBtn(this)">No 😤</button>
    </div>

    <button class="music-btn" onclick="toggleMusic()">🎵 Play Music</button>

</div>

<audio id="bgMusic" loop>
    <source src="khushiyaan-juss-djjohalcom_cut.mp3" type="audio/mpeg">
</audio>


<script src="script.js"></script>
</body>
</html>
